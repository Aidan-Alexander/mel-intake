name: Newsletter intake

on:
  schedule:
    - cron: "0 8 * * *"      # ~09:00 London (BST) / 08:00 (GMT), daily
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: read               # no state to commit (dedupes via Airtable upsert)

concurrency:
  group: newsletter-intake
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/London
      SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run newsletter intake
        run: python newsletter_intake.py
